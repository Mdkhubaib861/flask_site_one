<div class="container">
    <h1>Student Exam Data</h1>
    <form action="/students_result" method="POST">
    <label class="form-label">Enter Student Name:</label>
    <input type="text" id="name" name="name" class="form-control">

    <label class="form-label mt-2">Select Gender:</label><br>
    Male <input type="radio" id="m" name="gender" value="Male">
    Female <input type="radio" id="f" name="gender" value="Female"><br><br>

    <label class="form-label" id="marks">Enter Marks</label><br>

    <div class="row">
        <div class="col-3">
            <label>English</label>
            <input type="number" class="form-control" name="english">
        </div>

        <div class="col-3">
            <label>Maths</label>
            <input type="number" class="form-control" name="maths">
        </div>

        <div class="col-3">
            <label>Physics</label>
            <input type="number" class="form-control" name="physics">
        </div>

        <div class="col-3">
            <label>Chemistry</label>
            <input type="number" class="form-control" name="chemistry"><br>
        </div>
    </div>
    <button class="btn btn-primary">
      Result
    </button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
